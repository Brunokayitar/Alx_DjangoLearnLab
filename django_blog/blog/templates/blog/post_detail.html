{% extends "base.html" %}
{% block content %}
    <article>
        <h2>{{ post.title }}</h2>
        <p class="post-meta">By {{ post.author }} on {{ post.published_date|date:"F d, Y" }}</p>
        <div class="post-content">
            {{ post.content|linebreaks }}
        </div>
        {% if user == post.author %}
            <div>
                <a href="{% url 'post-update' post.pk %}" class="btn btn-secondary">Edit</a>
                <a href="{% url 'post-delete' post.pk %}" class="btn btn-danger">Delete</a>
            </div>
        {% endif %}
    </article>
    <p><a href="{% url 'post-list' %}">Back to all posts</a></p>
{% endblock %}
