{% extends "base.html" %}
{% block content %}
    <h2>All Blog Posts</h2>
    {% if posts %}
        {% for post in posts %}
            <article class="post-preview">
                <h3><a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a></h3>
                <p class="post-meta">By {{ post.author }} on {{ post.published_date|date:"F d, Y" }}</p>
                <p>{{ post.content|truncatewords:30 }}</p>
            </article>
            <hr>
        {% endfor %}
    {% else %}
        <p>No posts yet.</p>
    {% endif %}
{% endblock %}
